[tools]
go = "1.26.5"
watchexec = "latest"   # dev-only: Go auto-reload in dev-api

# Tasks: run with `mise run <name>` (or `mise <name>`). List: `mise tasks`.

[tasks.web-deps]
description = "Install web deps (cached on lockfile)"
dir = "web"
sources = ["package-lock.json"]
outputs = ["node_modules/.package-lock.json"]
run = "npm ci"

# No sources/outputs cache here, deliberately: the build task below restores the
# tracked placeholder index.html after embedding, so a cache skip would make
# `go build` silently embed the placeholder (real assets, "UI not built" page).
# The vite build is cheap; npm ci is the slow part and stays cached above.
[tasks.build-web]
description = "Build SPA into internal/httpapi/dist for embedding"
dir = "web"
depends = ["web-deps"]
run = "npm run build"

[tasks.build]
description = "Build static dockbrr binary (embeds SPA)"
depends = ["build-web"]
# Stamp commit/dirty/date via ldflags instead of Go's auto vcs.* build info:
# build-web just clobbered the tracked dist/index.html placeholder, so vcs.modified
# would always read "true". The porcelain check excludes that placeholder, so the
# dirty flag reflects real uncommitted work. -buildvcs=false drops the now-misleading
# auto stamp. See internal/version/version.go and internal/httpapi/system.go.
run = [
  """
  COMMIT=$(git rev-parse HEAD)
  DIRTY=false
  if [ -n "$(git status --porcelain --untracked-files=no -- . ':!internal/httpapi/dist/index.html')" ]; then DIRTY=true; fi
  DATE=$(git show -s --format=%cI HEAD)
  V=dockbrr/internal/version
  CGO_ENABLED=0 go build -buildvcs=false \
    -ldflags "-X $V.Commit=$COMMIT -X $V.CommitDirty=$DIRTY -X $V.BuildDate=$DATE" \
    -o dockbrr ./cmd/dockbrr
  """,
  # Restore tracked placeholder clobbered by the vite build.
  "git checkout -- internal/httpapi/dist/index.html",
]

[tasks.run]
description = "Build then launch dockbrr"
depends = ["build"]
run = "./dockbrr"

[tasks.dev]
description = "Full dev loop: API (:3625) + vite (:5173) together; Ctrl-C stops both"
run = "mise run dev-api ::: dev-web"

[tasks.dev-api]
description = "Run API on :3625 (vite proxy target); auto-restarts on Go changes"
env = { DOCKBRR_BIND = ":3625" }
# --print-events names the path+kind behind every restart (a restart with no
# event line above it did not come from the file watcher).
# build+exec, not `go run`: watchexec SIGTERMs the command, and `go run`'s
# compiled child can outlive it, and the orphan keeps holding :3625 and logging.
run = "watchexec -r -e go --print-events --stop-signal SIGTERM -- 'go build -o ./.dev/dockbrr ./cmd/dockbrr && exec ./.dev/dockbrr'"

[tasks.dev-web]
description = "Run vite dev server (:5173, proxies /api -> :3625)"
dir = "web"
run = "npm run dev"

[tasks.check]
description = "Vet + test Go and web"
run = [
  "go vet ./...",
  "go test ./...",
  "cd web && npm test",
]

[tasks.lint-go]
description = "golangci-lint over the Go tree (same config as CI)"
run = "go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./..."
