<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="dockbrr">
  <!-- Avatar / home-screen variant. Anywhere transparency is composited onto an
       unknown ground (Docker Hub, a GitHub org picture, iOS), the mark has to
       bring its own tile. On the navy the crate switches to sky, since #2563eb is
       too close to #0f172a to hold its edge. -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <g transform="translate(32 32) scale(.8) translate(-32 -31.25)">
    <mask id="badge-gap-tile">
      <rect width="64" height="64" fill="#fff"/>
      <circle cx="51" cy="12.5" r="11.5" fill="#000"/>
    </mask>
    <g mask="url(#badge-gap-tile)" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round">
      <rect x="7" y="20" width="39" height="36" rx="6"/>
      <path d="M7 32h39"/>
      <path d="M21 44h11" opacity=".45"/>
    </g>
    <circle cx="51" cy="12.5" r="8.5" fill="#f59e0b"/>
  </g>
</svg>
